<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi IPTV</title>
  <meta name="description" content="Reproductor IPTV personal con canales de libre difusión mundial" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mi IPTV" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #273348;
      --border: rgba(255,255,255,0.08); --accent: #38bdf8;
      --accent-dim: rgba(56,189,248,0.12); --text: #f1f5f9;
      --text-muted: #94a3b8; --red: #f87171; --green: #4ade80;
      --yellow: #facc15; --radius: 10px; --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }

    .topbar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 10px 14px 8px; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 10;
    }
    .logo { font-size: 17px; font-weight: 700; color: var(--accent); flex-shrink: 0; margin-right: 4px; }
    .topbar select, .topbar input {
      height: 34px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); padding: 0 10px; font-size: 13px;
    }
    .topbar select { width: 155px; }
    .topbar input { flex: 1; min-width: 120px; }
    .topbar input::placeholder { color: var(--text-muted); }
    .btn-search {
      height: 34px; padding: 0 14px; border-radius: var(--radius-sm);
      border: none; background: var(--accent); color: #0f172a;
      font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0;
    }
    .btn-search:hover { opacity: 0.85; }
    .btn-search:disabled { opacity: 0.4; cursor: not-allowed; }
    .filter-hint { font-size: 11px; color: var(--text-muted); width: 100%; padding: 0 2px; display: none; }
    .filter-hint.visible { display: block; }

    .layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100dvh - 68px); }
    .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header {
      padding: 8px 14px; font-size: 12px; color: var(--text-muted);
      border-bottom: 1px solid var(--border); background: var(--surface);
      display: flex; justify-content: space-between; align-items: center;
    }
    .channel-list { overflow-y: auto; flex: 1; }
    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .channel-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background 0.1s;
    }
    .channel-item:hover { background: var(--surface); }
    .channel-item.active { background: var(--accent-dim); }
    .channel-item.active .ch-name { color: var(--accent); }
    .ch-logo {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      object-fit: contain; background: var(--surface2);
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .ch-logo-placeholder {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--text-muted);
    }
    .ch-info { min-width: 0; flex: 1; }
    .ch-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .player-section { display: flex; flex-direction: column; overflow: hidden; }
    .video-wrap { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; display: block; }
    .idle-screen { text-align: center; color: var(--text-muted); }
    .idle-screen .big-icon { font-size: 52px; margin-bottom: 10px; opacity: 0.3; }

    .player-bar {
      padding: 10px 16px; border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .player-name { font-size: 15px; font-weight: 600; }
    .player-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .status-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; font-weight: 500; display: none; }
    .status-pill.live    { background: rgba(74,222,128,0.15); color: var(--green); display: inline-block; }
    .status-pill.loading { background: rgba(250,204,21,0.15); color: var(--yellow); display: inline-block; }
    .status-pill.error   { background: rgba(248,113,113,0.15); color: var(--red); display: inline-block; }
    .msg { padding: 2rem 1rem; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 1.6; }

    @media (max-width: 640px) {
      .topbar select { width: calc(50% - 4px); }
      .topbar input { width: 100%; }
      .layout { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; height: auto; min-height: calc(100dvh - 120px); }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); height: 220px; }
      .video-wrap { min-height: 200px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">📺 Mi IPTV</div>
  <select id="cat-select">
    <option value="">📂 Categoría (opcional)</option>
    <option value="news">📰 Noticias</option>
    <option value="sports">⚽ Deportes</option>
    <option value="entertainment">🎬 Entretenimiento</option>
    <option value="movies">🎥 Películas</option>
    <option value="music">🎵 Música</option>
    <option value="kids">🧸 Infantil</option>
    <option value="documentary">🎞 Documentales</option>
    <option value="education">📚 Educación</option>
  </select>
  <select id="country-select">
    <option value="">🌍 País (opcional)</option>
    <option value="pa">🇵🇦 Panamá</option>
    <option value="us">🇺🇸 EE.UU.</option>
    <option value="es">🇪🇸 España</option>
    <option value="mx">🇲🇽 México</option>
    <option value="ar">🇦🇷 Argentina</option>
    <option value="co">🇨🇴 Colombia</option>
    <option value="cr">🇨🇷 Costa Rica</option>
    <option value="ve">🇻🇪 Venezuela</option>
    <option value="cl">🇨🇱 Chile</option>
    <option value="pe">🇵🇪 Perú</option>
    <option value="do">🇩🇴 R. Dominicana</option>
    <option value="gb">🇬🇧 Reino Unido</option>
    <option value="fr">🇫🇷 Francia</option>
    <option value="de">🇩🇪 Alemania</option>
    <option value="it">🇮🇹 Italia</option>
    <option value="br">🇧🇷 Brasil</option>
    <option value="pt">🇵🇹 Portugal</option>
  </select>
  <input type="text" id="search" placeholder="Buscar canal…" />
  <button class="btn-search" id="btn-search" onclick="doSearch()">Buscar</button>
  <div class="filter-hint" id="filter-hint"></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span id="list-label">Elige categoría y/o país</span>
      <span id="list-count" style="color:var(--accent);font-weight:600"></span>
    </div>
    <div class="channel-list" id="channel-list">
      <div class="msg">👆 Selecciona una categoría, un país, o ambos</div>
    </div>
  </div>

  <div class="player-section">
    <div class="video-wrap" id="video-wrap">
      <div class="idle-screen">
        <div class="big-icon">📺</div>
        <p>Selecciona un canal de la lista</p>
      </div>
    </div>
    <div class="player-bar">
      <div>
        <div class="player-name" id="player-name">Sin canal</div>
        <div class="player-meta" id="player-meta">Elige un canal para comenzar</div>
      </div>
      <span class="status-pill" id="status-pill"></span>
    </div>
  </div>
</div>

<script>
const BASE = 'https://iptv-org.github.io/iptv/';
const PROXIES = [
  url => url,
  url => `https://api.codetabs.com/v1/proxy?quest=${url}`,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
];

const CAT_URLS = {
  'news': BASE+'categories/news.m3u', 'sports': BASE+'categories/sports.m3u',
  'entertainment': BASE+'categories/entertainment.m3u', 'movies': BASE+'categories/movies.m3u',
  'music': BASE+'categories/music.m3u', 'kids': BASE+'categories/kids.m3u',
  'documentary': BASE+'categories/documentary.m3u', 'education': BASE+'categories/education.m3u',
};
const COUNTRY_URLS = {
  'pa': BASE+'countries/pa.m3u', 'us': BASE+'countries/us.m3u',
  'es': BASE+'countries/es.m3u', 'mx': BASE+'countries/mx.m3u',
  'ar': BASE+'countries/ar.m3u', 'co': BASE+'countries/co.m3u',
  'cr': BASE+'countries/cr.m3u', 've': BASE+'countries/ve.m3u',
  'cl': BASE+'countries/cl.m3u', 'pe': BASE+'countries/pe.m3u',
  'do': BASE+'countries/do.m3u', 'gb': BASE+'countries/gb.m3u',
  'fr': BASE+'countries/fr.m3u', 'de': BASE+'countries/de.m3u',
  'it': BASE+'countries/it.m3u', 'br': BASE+'countries/br.m3u',
  'pt': BASE+'countries/pt.m3u',
};

let visibleChannels = [];
let currentHls = null;

function parseM3U(text) {
  const lines = text.split('\n'), result = [];
  let cur = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (line.startsWith('#EXTINF')) {
      cur = {};
      const name = line.match(/,(.+)$/); cur.name = name ? name[1].trim() : 'Canal';
      const logo = line.match(/tvg-logo="([^"]+)"/); cur.logo = logo ? logo[1] : '';
      const country = line.match(/tvg-country="([^"]+)"/); cur.country = country ? country[1].toUpperCase() : '';
      const group = line.match(/group-title="([^"]+)"/); cur.group = group ? group[1] : '';
    } else if (line && !line.startsWith('#') && cur) {
      cur.url = line; result.push(cur); cur = null;
    }
  }
  return result;
}

async function fetchM3U(url) {
  for (const p of PROXIES) {
    try {
      const r = await fetch(p(url), { signal: AbortSignal.timeout(10000) });
      if (r.ok) { const t = await r.text(); if (t.includes('#EXTINF')) return t; }
    } catch {}
  }
  throw new Error('No se pudo cargar');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setStatus(type, text) {
  const pill = document.getElementById('status-pill');
  pill.className = 'status-pill ' + type;
  pill.textContent = text;
}

function renderChannels(channels) {
  visibleChannels = channels.slice(0, 600);
  document.getElementById('list-count').textContent = channels.length.toLocaleString();
  const list = document.getElementById('channel-list');
  if (!channels.length) {
    list.innerHTML = '<div class="msg">No se encontraron canales con esa combinación.</div>';
    return;
  }
  list.innerHTML = visibleChannels.map((ch, i) => `
    <div class="channel-item" id="ci-${i}" onclick="play(${i})">
      ${ch.logo
        ? `<img class="ch-logo" src="${ch.logo}" loading="lazy" onerror="this.outerHTML='<div class=\\'ch-logo-placeholder\\'>📺</div>'">`
        : '<div class="ch-logo-placeholder">📺</div>'}
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-meta">${esc([ch.group, ch.country].filter(Boolean).join(' · '))}</div>
      </div>
    </div>`).join('');
}

function play(idx) {
  const ch = visibleChannels[idx];
  if (!ch) return;
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('ci-' + idx);
  if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest' }); }
  document.getElementById('player-name').textContent = ch.name;
  document.getElementById('player-meta').textContent = [ch.group, ch.country].filter(Boolean).join(' · ') || 'Canal de libre difusión';
  setStatus('loading', '⏳ Conectando…');
  if (currentHls) { currentHls.destroy(); currentHls = null; }
  const wrap = document.getElementById('video-wrap');
  wrap.innerHTML = '<video id="tv" controls autoplay playsinline style="width:100%;height:100%"></video>';
  const video = document.getElementById('tv');
  video.addEventListener('playing',  () => setStatus('live',  '🔴 En vivo'));
  video.addEventListener('waiting',  () => setStatus('loading','⏳ Cargando…'));
  video.addEventListener('error',    () => setStatus('error',  '✕ No disponible'));
  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: false, maxBufferLength: 30 });
    currentHls = hls;
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) setStatus('error', '✕ No disponible'); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = ch.url; video.play().catch(() => setStatus('error', '✕ No disponible'));
  } else { setStatus('error', '✕ Formato no soportado'); }
}

async function doSearch() {
  const cat = document.getElementById('cat-select').value;
  const country = document.getElementById('country-select').value;
  const q = document.getElementById('search').value.toLowerCase().trim();

  if (!cat && !country && !q) {
    document.getElementById('channel-list').innerHTML = '<div class="msg">Selecciona al menos una categoría, un país, o escribe algo en el buscador.</div>';
    return;
  }

  const btn = document.getElementById('btn-search');
  btn.disabled = true; btn.textContent = 'Cargando…';
  document.getElementById('channel-list').innerHTML = '<div class="msg">Descargando lista…</div>';
  document.getElementById('list-count').textContent = '';

  // Build hint
  const parts = [];
  if (cat) parts.push(document.querySelector(`#cat-select option[value="${cat}"]`).textContent);
  if (country) parts.push(document.querySelector(`#country-select option[value="${country}"]`).textContent);
  const hint = document.getElementById('filter-hint');
  hint.textContent = parts.length ? 'Filtrando: ' + parts.join(' + ') : '';
  hint.className = 'filter-hint' + (parts.length ? ' visible' : '');

  try {
    let catChannels = null, countryChannels = null;

    // Fetch category list if selected
    if (cat && CAT_URLS[cat]) {
      const text = await fetchM3U(CAT_URLS[cat]);
      catChannels = parseM3U(text);
    }

    // Fetch country list if selected
    if (country && COUNTRY_URLS[country]) {
      const text = await fetchM3U(COUNTRY_URLS[country]);
      countryChannels = parseM3U(text);
    }

    let result;

    if (catChannels && countryChannels) {
      // Intersect by name (case-insensitive)
      const countryNames = new Set(countryChannels.map(c => c.name.toLowerCase().trim()));
      result = catChannels.filter(c => countryNames.has(c.name.toLowerCase().trim()));
      // If intersection is empty, show country channels filtered by group matching category
      if (result.length === 0) {
        const catLabel = document.querySelector(`#cat-select option[value="${cat}"]`).textContent.replace(/^[^\w]+/, '').toLowerCase();
        result = countryChannels.filter(c => (c.group || '').toLowerCase().includes(catLabel.split(' ')[0]));
      }
      document.getElementById('list-label').textContent = `${parts[0]} + ${parts[1]}`;
    } else if (catChannels) {
      result = catChannels;
      document.getElementById('list-label').textContent = parts[0];
    } else {
      result = countryChannels;
      document.getElementById('list-label').textContent = parts[0];
    }

    // Apply text search
    if (q) result = result.filter(c => c.name.toLowerCase().includes(q) || (c.group||'').toLowerCase().includes(q));

    renderChannels(result);
  } catch(e) {
    document.getElementById('channel-list').innerHTML = '<div class="msg">❌ No se pudo cargar la lista.<br>Verifica tu conexión e intenta de nuevo.</div>';
  } finally {
    btn.disabled = false; btn.textContent = 'Buscar';
  }
}

// Allow pressing Enter in search box
document.getElementById('search').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
